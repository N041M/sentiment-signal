services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: sentiment_signal
      POSTGRES_USER: sentiment
      POSTGRES_PASSWORD: sentiment
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentiment -d sentiment_signal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
